<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arts — Archive</title>
    <style>
        /* Стили полностью скопированы с эстетики референса */
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #ffffff;
            color: #000000;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header, footer, .content-container {
            width: 100%;
            max-width: 800px;
        }

        .nav-links {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-top: 60px;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        .nav-links a {
            color: #000000;
            text-decoration: none;
        }

        .nav-links a:hover {
            text-decoration: underline;
        }

        .series-item {
            margin-bottom: 60px;
            width: 100%;
        }

        .series-header {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
        }

        .media-container {
            width: 100%;
            background-color: #ffffff;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .media-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        .description {
            font-size: 12px;
            line-height: 1.6;
            white-space: pre-line;
            text-align: justify;
        }

        /* Скрытый вход в админку */
        .admin-trigger {
            margin-top: 40px;
            font-size: 10px;
            color: #e0e0e0;
            cursor: pointer;
            text-decoration: none;
            transition: color 0.2s;
        }
        .admin-trigger:hover {
            color: #000;
        }

        /* Панель управления */
        #admin-panel {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.99);
            z-index: 1000;
            padding: 40px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .admin-form {
            max-width: 500px;
            margin: 40px auto 0 auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .admin-form h3 {
            font-size: 14px;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .admin-form input, .admin-form textarea {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            padding: 12px;
            border: 1px solid #000;
            width: 100%;
            box-sizing: border-box;
            background: #fff;
        }

        .admin-form button {
            background: #000;
            color: #fff;
            padding: 14px;
            border: none;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
            transition: background 0.2s;
        }
        .admin-form button:hover {
            background: #333;
        }
    </style>
</head>
<body>

    <div class="content-container" id="articles-list">
        <p id="loading-text">Синхронизация с архивом GitHub...</p>
    </div>

    <footer>
        <div class="nav-links">
            <a href="#">Notifications</a>
            <a href="#">Privacy</a>
            <a href="#">Terms</a>
            <a href="#">Help</a>
        </div>
        <div style="text-align: center;">
            <span class="admin-trigger" onclick="toggleAdmin()">• admin login</span>
        </div>
    </footer>

    <div id="admin-panel">
        <div class="admin-form">
            <h3>[ ДОБАВИТЬ МАТЕРИАЛ В АРХИВ ]</h3>
            <input type="password" id="gh-token" placeholder="GitHub Personal Access Token">
            <input type="text" id="post-title" placeholder="НАЗ
